version: "3.8"

services:
  # ── Servicio Backend (Flask) ───────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prj5-backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-appdb}
      - DB_USER=${DB_USER:-appuser}
      - DB_PASSWORD=${DB_PASSWORD:-apppassword123}
      - FLASK_ENV=${FLASK_ENV:-development}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  # ── Servicio Base de Datos (PostgreSQL) ────────────────
  db:
    image: postgres:15-alpine
    container_name: prj5-db
    environment:
      - POSTGRES_DB=${DB_NAME:-appdb}
      - POSTGRES_USER=${DB_USER:-appuser}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-apppassword123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-appuser} -d ${DB_NAME:-appdb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

# ── Volúmenes ──────────────────────────────────────────
volumes:
  postgres_data:

# ── Redes ──────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
